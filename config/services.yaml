parameters:
    products_images_directory: '%kernel.project_dir%/public/uploads/products'
    # Fallbacks when Railway env vars are missing (health endpoint reports misconfigured)
    default_backend_uri: 'http://127.0.0.1:8000'
    default_google_redirect_uri: 'http://127.0.0.1:8000/connect/google/check'
    default_workerman_internal_url: 'http://127.0.0.1:8091'
    default_workerman_internal_token: ''
    default_onesignal_app_id: ''
    default_onesignal_api_key: ''

services:       
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    
    # explicitly wire JwtService with env var
    App\Service\JwtService:
        arguments:  
            $jwtSecret: '%env(resolve:JWT_SECRET)%'

    App\Service\EmailVerificationService:
        arguments:
            $fromAddress: '%env(MAILER_FROM_ADDRESS)%'
            $fromName: '%env(MAILER_FROM_NAME)%'

    App\Service\BrevoEmailService:
        arguments:
            $fromAddress: '%env(MAILER_FROM_ADDRESS)%'
            $fromName: '%env(MAILER_FROM_NAME)%'
            # Must be a real env var (see .env); Symfony default: processor needs a *parameter* name, not MAILER_FROM_ADDRESS
            $notifyEmail: '%env(CONTACT_NOTIFY_EMAIL)%'

    App\Service\VerificationUrlBuilder:
        arguments:
            $defaultUri: '%env(string:default:default_backend_uri:DEFAULT_URI)%'

    App\Service\WebSocketPublisher:
        arguments:
            $workermanUrl: '%env(default:default_workerman_internal_url:WORKERMAN_INTERNAL_URL)%'
            $internalToken: '%env(default:default_workerman_internal_token:WORKERMAN_INTERNAL_TOKEN)%'

    App\Service\OneSignalService:
        arguments:
            $appId: '%env(default:default_onesignal_app_id:ONESIGNAL_APP_ID)%'
            $apiKey: '%env(default:default_onesignal_api_key:ONESIGNAL_API_KEY)%'

    App\Security\GoogleAuthenticator:
        arguments:
            $frontendUrl: '%env(FRONTEND_URL)%'

    App\Controller\EmailVerificationController:
        arguments:
            $frontendUrl: '%env(FRONTEND_URL)%'
    
    # Register ActivityLogSubscriber as Doctrine event subscriber
    App\EventSubscriber\ActivityLogSubscriber:
        tags:
            - { name: doctrine.event_subscriber }

