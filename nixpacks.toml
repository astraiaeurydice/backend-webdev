# Ensures PHP 8.2+ and required extensions for Symfony + MySQL
[phases.setup]
nixPkgs = ["php82", "php82Extensions.curl", "php82Extensions.mbstring", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.openssl", "php82Extensions.intl", "php82Extensions.zip"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "bash scripts/railway-start.sh"
