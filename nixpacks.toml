# Ensures PHP 8.2+ and required extensions for Symfony + MySQL
[variables]
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.curl",
  "php82Extensions.mbstring",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.openssl",
  "php82Extensions.intl",
  "php82Extensions.zip",
]

[phases.install]
cmds = ["COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "bash scripts/railway-start.sh"
