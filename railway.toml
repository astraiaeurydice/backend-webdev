# Railway deploy config — set Root Directory to "Backend" in the Railway dashboard.
# Docs: https://docs.railway.com/guides/symfony

[build]
builder = "NIXPACKS"
buildCommand = "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"

[deploy]
startCommand = "bash scripts/railway-start.sh"
# /ping.php works without Symfony; /api/health needs index.php router (see railway-start.sh)
healthcheckPath = "/ping.php"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
